# .github/dependabot — automated dependency + action update PRs.
# Watches every ecosystem in the monorepo weekly; groups minor/patch to reduce PR noise.

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule: { interval: "weekly" }

  - package-ecosystem: "pip"
    directory: "/detector"
    schedule: { interval: "weekly" }
    groups:
      detector: { update-types: ["minor", "patch"] }

  - package-ecosystem: "pip"
    directory: "/harness"
    schedule: { interval: "weekly" }
    groups:
      harness: { update-types: ["minor", "patch"] }

  - package-ecosystem: "gomod"
    directory: "/edge"
    schedule: { interval: "weekly" }

  - package-ecosystem: "npm"
    directory: "/collector"
    schedule: { interval: "weekly" }
    groups:
      collector: { update-types: ["minor", "patch"] }

  - package-ecosystem: "docker"
    directory: "/edge"
    schedule: { interval: "weekly" }

  # The stealth evader pins playwright/patchright/rebrowser-playwright to one Chromium revision;
  # rebrowser-playwright caps at 1.52.0, so anything newer breaks that coherence — hold at 1.52.x.
  - package-ecosystem: "npm"
    directory: "/evaders/stealth"
    schedule: { interval: "weekly" }
    ignore:
      - dependency-name: "playwright"
        versions: [">=1.53.0"]
      - dependency-name: "rebrowser-playwright"
        versions: [">=1.53.0"]
