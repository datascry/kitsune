# .github/workflows/build-push — publish the detector + edge images to GHCR on each release.
# Pull-based CD (Option B): a release triggers this build; the VPS's Watchtower auto-pulls the new images.

name: build-push
on:
  release:
    types: [published] # release-please publishes the GitHub Release when its release PR is merged
  workflow_dispatch: {}

# Minimal top-level token; only the images job is granted packages:write (Scorecard TokenPermissions).
permissions:
  contents: read

jobs:
  images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: detector
            context: "."
            dockerfile: detector/Dockerfile
          - service: edge
            context: ./edge
            dockerfile: edge/Dockerfile
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/kitsune-${{ matrix.service }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
