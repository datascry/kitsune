# .github/workflows/release — automated, versioned releases from Conventional Commits.
# release-please opens/maintains a release PR and tags + writes the changelog on merge.

name: release
on:
  push: { branches: [main] }

# Minimal default token; the release job elevates only what release-please needs (Scorecard TokenPermissions).
permissions:
  contents: read

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          release-type: simple
