# .github/workflows/release — automated, versioned releases from Conventional Commits.
# release-please opens/maintains a release PR and tags + writes the changelog on merge.

name: release
on:
  push: { branches: [main] }

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        with:
          release-type: simple
