# docker-compose.deploy — pull-based CD overlay (Option B): run GHCR images + Watchtower auto-update.
# Use WITH the base + prod overlays on the VPS:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.deploy.yml pull
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.deploy.yml up -d
# `pull` fetches the GHCR images so `up` (no --build) runs them; Watchtower then auto-pulls future releases.

services:
  detector:
    image: ghcr.io/datascry/kitsune-detector:latest
    labels:
      - "com.centurylinklabs.watchtower.enable=true" # only this + edge are auto-updated (label-scoped)

  edge:
    image: ghcr.io/datascry/kitsune-edge:latest
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # The public arena challenge-gate (owned infra). The base file builds it from source; here it runs the
  # GHCR image (build-push publishes kitsune-arena on every release) so the pull-based stack picks it up and
  # Watchtower auto-updates it alongside detector/edge. The detector relays /arena/* to it (KITSUNE_ARENA_URL
  # = http://arena:8095, set in the base file) — without this service running, /arena returns 503.
  arena:
    image: ghcr.io/datascry/kitsune-arena:latest
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # Watches GHCR for new detector/edge/arena image tags and pulls + restarts them in place. A release ->
  # build-push -> Watchtower pull is the whole CD loop, with no inbound CI->VPS access.
  watchtower:
    image: containrrr/watchtower:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock # NOTE: socket access is root-equivalent (single-box trade-off)
    environment:
      WATCHTOWER_LABEL_ENABLE: "true" # update only the labelled containers (detector, edge, arena), not itself/certbot
      WATCHTOWER_POLL_INTERVAL: "300" # check every 5 min
      WATCHTOWER_CLEANUP: "true" # remove the superseded image after a successful update
    restart: unless-stopped
