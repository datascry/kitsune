    predicate: present
    weight: 0.6
    status: active
    category: artifact
    added: "2026-06-19"
    last_validated: "2026-06-19"
    source: "JShelter's canvas farbling wraps isPointInPath/isPointInStroke to flip the answer with ~5% probability to poison fingerprinting. But these are EXACT geometric hit-tests (nonzero/evenodd fill rule, no rasterization, no AA for a point far from the boundary) — GPU-independent and deterministic in every real engine, headless or not: a point 30px inside a filled square is ALWAYS in-path, one 15px outside is NEVER in-path. The probe runs 120 trials on a deep-interior + far-exterior point; a real browser never errs (1-0.95^120 ≈ 99.8% catch on a 5%-flip farbler). Distinct from canvas_noise (Brave's readback farbling — geometry is untouched there). FP-safe ACTIVE: a missing isPointInPath never fires, and only a definitive interior/exterior verdict counts, so sub-pixel/AA ambiguity cannot misfire. Convicting artifact: a canvas-geometry-randomizing shim is an anti-fingerprinting modification, never a stock browser."
