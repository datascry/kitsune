# Kitsune coherence-rule registry — knowledge as data.
#
# The detector's coherence engine is a small generic evaluator; the knowledge lives here.
# A rule "fires" (emits a Contradiction) when its predicate holds over the resolved `reads`.
#
# Predicate firing semantics (see detector/.../coherence/predicates.py):
#   present          fires if reads[0] resolves to a truthy value   (boolean tells)
#   absent           fires if reads[0] is missing or falsy
#   equals           fires if reads[0] == reads[1]
#   not_equal        fires if reads[0] != reads[1] AND both are present (no fire on missing data)
#   below_threshold  fires if numeric reads[0] < threshold
#   above_threshold  fires if numeric reads[0] > threshold
#
# When a signal decays (e.g. a browser change kills a CDP tell), set status: retired and bump
# last_validated — do not delete history. Composite/cross-conditional rules are future work.

ruleset_version: "0.74.22"

rules:
  - id: net.tls_os_vs_tcp_os
    title: JA4-implied OS contradicts TCP/IP-implied OS
    layers: [network]
    reads: [network.ja4_os_hint, network.tcp_os_hint]
    predicate: not_equal
    category: coherence
    weight: 0.6
    # experimental: no live producer for tcp_os_hint yet — TCP/IP-stack fingerprinting needs raw-packet
    # capture (CAP_NET_RAW / AF_PACKET) the userspace edge does not have. The rule + logic are validated;
    # it activates once a packet-capture sidecar emits tcp_os_hint.
    status: experimental
    added: "2026-06-17"
    last_validated: "2026-06-17"
    source: "Kitsune; cf. Vastel FP-Inconsistent (IMC 2025)"

  - id: net.tls_vs_ua_browser
    title: JA4 browser family contradicts User-Agent browser
    layers: [network, browser]
    reads: [network.ja4_browser_hint, browser.ua_browser]
    predicate: not_equal
    category: coherence
    weight: 0.7
    status: active
    added: "2026-06-17"
    last_validated: "2026-06-19"
    source: "The core cross-layer thesis tell: the TLS engine (JA4) below the JS spoofing layer must agree with the browser the UA claims. A Chromium-TLS client wearing a Firefox/Safari UA disagrees. v0.74.15 FIRST LIVE POSITIVES + a robustness fix: previously 'evaded' because the edge JA4→browser hint table keyed on a FULL JA4 (incl. JA4_c, the extension/sig-alg hash) — and the real headful Chromium's JA4_c (d8a2da3f94cd) differs from the seeded one (02713d6af862), so REAL Chrome itself got ja4_browser_hint=None (unhinted → rule unevaluable). Fixed by adding the Chromium cipher-suite PREFIX (t13d1516h2_8daaf6152771 → chrome) to edge/internal/fingerprint/ja4_hints.json; the Lookup already falls back to the JA4_a+JA4_b prefix (cipher-level identity is the stable per-engine key, robust to JA4_c randomization — itself an anti-detect technique Camoufox uses). Now: real headful Chromium → prefix=chrome, ua_browser=chrome → MATCH, no fire (GROUNDED, FP-safe); spoof-ua (chrome TLS + Firefox UA) and ios-ua-spoof (chrome TLS + Safari UA) → prefix=chrome, ua_browser=firefox/safari → fire (two live positives). Chrome-impersonators with no JS (primp/curl-impersonate, ua_browser absent) don't fire — the not_equal predicate needs both reads. Browserforge calibration has no JA4, so promotion cannot raise the legit flag rate. v0.74.19: extended the hint table to the WebKit engine — the real WebKit TLS prefix (t13d2914h2_723694b0fccc -> safari) was unhinted, so a WebKit-engine bot faking a non-Safari UA evaded this rule. GROUNDED + FP-SAFE: a real WebKit + Safari UA (the headful capture) now hints safari == ua_browser safari -> MATCH, no fire; the new webkit-ua-spoof evader (Playwright WebKit under a Chrome UA) -> safari != chrome -> fires (live positive). FP-safe even though Playwright WebKit's TLS may differ from Apple Secure Transport's real-Safari JA4: no real USER produces this JA4 (it is the WebKit-engine handshake), so hinting it safari can only ever match a WebKit+Safari session (no fire) or catch a WebKit-engine UA-spoof. Caveat: real macOS/iOS Safari has its own (unverified-in-sandbox) JA4 and stays unhinted until a real-Safari capture is available — a coverage gap, not an FP. The hint table now identifies all three engines (chromium/firefox/webkit)."

