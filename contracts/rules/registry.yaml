  - id: net.quic_grease_vs_ua
    title: Modern-browser UA but the QUIC ClientHello has no GREASE
    layers: [network, browser]
    reads: [network.quic_no_grease]
    predicate: present
    weight: 0.6
    # Validated live end to end (corpus/sessions/quic-no-grease.json): a quic-go client attempts QUIC at
    # the edge, its Initial is captured + decrypted, and on the same IP's HTTP request the edge emits
    # quic_no_grease under a Chrome UA -> this rule fires. Real browsers GREASE their QUIC hello (same
    # HasGREASE logic as the active net.tls_grease_vs_ua), so it stays quiet on them.
    status: active
    category: coherence
    added: "2026-06-18"
    last_validated: "2026-06-18"
    source: "RFC 9001; every browser GREASEs its QUIC ClientHello, a non-browser QUIC stack (quic-go / Go crypto-tls, verified) does not — the QUIC analog of net.tls_grease_vs_ua"

  - id: net.quic_pq_keyshare_vs_ua
    title: Current-Chrome UA but the QUIC ClientHello offers no post-quantum key share
    layers: [network, browser]
    reads: [network.quic_no_pq_keyshare]
    predicate: present
    weight: 0.5
    # experimental, same as the TCP analog net.tls_pq_keyshare_vs_ua: catches a QUIC stack pinned to a
    # pre-2025 Chrome template (GREASE present but no MLKEM); a current quic-go/Go-1.24 stack ships PQ, and
    # the rule only sees QUIC when the client attempts it at the edge.
    status: experimental
    category: coherence
    added: "2026-06-18"
    last_validated: "2026-06-18"
    source: "Chrome 131+ sends X25519MLKEM768 in its QUIC ClientHello (TLS 1.3 over QUIC); a stale template lags it — the QUIC analog of net.tls_pq_keyshare_vs_ua"

  - id: net.h2_unknown_vs_ua
    title: Modern-browser UA but the HTTP/2 stack matches no known browser engine
    layers: [network]
    reads: [network.h2_engine_unknown]
    predicate: present
    category: coherence
    weight: 0.6
    status: active
    added: "2026-06-18"
    last_validated: "2026-06-18"
    source: "Every real browser sends a recognised h2 pseudo-header order (Chrome m,a,s,p; Firefox m,p,a,s; Safari m,s,p,a); a Go/Python http2 client — or a browser fronted by a non-browser h2 proxy — under a browser UA does not. The h2 analog of tls_no_grease, and a second network-layer tell beyond no_js_execution. Closes the gap where net.h2_vs_ua_browser stays silent on an *unrecognised* (not merely mismatched) h2 engine."

  - id: net.h2_header_order_vs_ua
    title: Chromium UA but the HTTP/2 regular-header order is not chromium-shaped (JA4H)
    layers: [network]
    reads: [network.h2_header_order_non_chromium]
    predicate: present
    weight: 0.6
    status: active
    category: coherence
    added: "2026-06-18"
    last_validated: "2026-06-19"
    source: "JA4H regular-header order: Chromium emits the Sec-CH-UA client-hint group before user-agent on a secure origin; a Chrome/Edge UA whose header order does not is a non-browser h2 stack wearing a Chrome UA. Conservative + asymmetric (only the Chromium signature is positively classified; Firefox/Safari/non-browser stay 'unknown' and gate off) — experimental pending live-fleet validation of real-browser header orders. Extends pseudo-header coverage (net.h2_unknown_vs_ua) to the regular-header order. Ref FoxIO JA4H. v0.73.7 LIVE re-validation (detector+edge stack vs the HTTP fleet): zero positives — primp and go-tls replicate Chrome's h2 regular-header order (the edge correctly never emits h2_header_order_non_chromium), and the only non-Chromium stack (httpx/vanilla) speaks HTTP/1.1 so it has no h2 order at all. The read signal is genuinely never produced by the current fleet — chromium-impersonation stacks defeat it by replicating Chrome's order. Stays experimental/dormant: correct behavior (not a bug); needs a non-Chromium h2 stack to fire. v0.74.12 LIVE POSITIVE: the new http2-naive evader (vanilla KS_HTTP2=1 + a Chrome KS_UA — httpx over HTTP/2 with the h2 stack) emits a non-Chrome regular-header order (no Sec-CH-UA group) under a Chrome UA, so the edge emits h2_header_order_non_chromium=True and this rule fires — its FIRST live positive. Confirms the rule is correct and capable, not dead: it catches the naive h2 scraper that fakes a Chrome UA without replicating Chrome's on-wire order (where curl-impersonate/primp/go-tls defeat it by replicating). Grounded: a real Chrome (the headful captures) emits the Sec-CH-UA-first order → never fires. v0.74.13 PROMOTED experimental→active: a SECOND independent non-Chrome h2 stack corroborates — plain curl --http2 (nghttp2/C, corpus/sessions/curl-http2.json) with a Chrome UA also emits a non-Chrome order (distinct h2 SETTINGS from httpx) and trips the rule. Two independent non-Chrome stacks (httpx/Python h2, curl/nghttp2) fire it; the real-Chrome NEGATIVE is grounded across the headful Chromium capture AND all 40+ Chrome evaders/impersonators (primp/go-tls/curl-impersonate/stealth/nodriver/… all emit the Sec-CH-UA-first order → h2_header_order_non_chromium absent). Browserforge calibration has no h2 layer, so promotion cannot raise its legit-browser flag rate. RESIDUAL CAVEAT (documented, not blocking — same class as net.tcp_os_vs_ua's proxy confound): a real Chrome behind an enterprise HTTP/2 forward proxy that RE-SERIALISES the request could lose Chrome's header order and trip this; the lab edge is the first hop (sees the client directly), and such a proxy would disturb other signals too, so the residual FP is an edge case to revisit if a real-Chrome-through-h2-proxy capture becomes available."

