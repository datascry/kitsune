    source: "Kitsune"

  # NB: submovement_count and pause_ratio are still emitted by the collector (observational biomech), but
  # carry no standalone rule: the 10-user Balabit calibration (docs/behavioral-data.md) shows that over a
  # short live-capture window the human floor reaches them (submovement_count p10=2, p5=1; pause_ratio
  # p5=0.062), so a below-threshold rule would false-positive on real short movements. Only the power-law
  # exponent has a clean human floor (p1=0.116, well above 0.1) — the one biomech axis safe as a threshold.

  - id: bh.power_law_violation
    title: Mouse motion violates the 2/3 power law (speed independent of curvature — synthetic path)
    layers: [behavioral]
    reads: [behavioral.power_law_exponent]
    predicate: below_threshold
    threshold: 0.1
    weight: 0.55
    status: experimental
    category: behavioral
    added: "2026-06-18"
    last_validated: "2026-06-18"
    source: "Lacquaniti 2/3 power law (1983); 10-user Balabit calibration (docs/behavioral-data.md): human exponent median 0.55, p1 0.116 — a Bezier/constant-velocity path has β≈0 or negative, well below the human floor."

