    last_validated: "2026-06-18"
    source: "CreepJS / bot.sannysoft.com: screen.availWidth/Height can never exceed screen.width/height on a real device; avail > total is a spoofed/sloppily-randomised screen lie (both logical px, no zoom/dpr confound)"

  - id: net.quic_grease_vs_ua
    title: Modern-browser UA but the QUIC ClientHello has no GREASE
    layers: [network, browser]
    reads: [network.quic_no_grease]
    predicate: present
    weight: 0.6
    # Validated live end to end (corpus/sessions/quic-no-grease.json): a quic-go client attempts QUIC at
    # the edge, its Initial is captured + decrypted, and on the same IP's HTTP request the edge emits
    # quic_no_grease under a Chrome UA -> this rule fires. Real browsers GREASE their QUIC hello (same
    # HasGREASE logic as the active net.tls_grease_vs_ua), so it stays quiet on them.
    status: active
    category: coherence
    added: "2026-06-18"
    last_validated: "2026-06-18"
    source: "RFC 9001; every browser GREASEs its QUIC ClientHello, a non-browser QUIC stack (quic-go / Go crypto-tls, verified) does not — the QUIC analog of net.tls_grease_vs_ua"

  - id: net.quic_pq_keyshare_vs_ua
    title: Current-Chrome UA but the QUIC ClientHello offers no post-quantum key share
    layers: [network, browser]
    reads: [network.quic_no_pq_keyshare]
    predicate: present
    weight: 0.5
    # experimental, same as the TCP analog net.tls_pq_keyshare_vs_ua: catches a QUIC stack pinned to a
    # pre-2025 Chrome template (GREASE present but no MLKEM); a current quic-go/Go-1.24 stack ships PQ, and
    # the rule only sees QUIC when the client attempts it at the edge.
    status: experimental
    category: coherence
    added: "2026-06-18"
    last_validated: "2026-06-18"
    source: "Chrome 131+ sends X25519MLKEM768 in its QUIC ClientHello (TLS 1.3 over QUIC); a stale template lags it — the QUIC analog of net.tls_pq_keyshare_vs_ua"

  - id: net.h2_unknown_vs_ua
    title: Modern-browser UA but the HTTP/2 stack matches no known browser engine
    layers: [network]
    reads: [network.h2_engine_unknown]
    predicate: present
    category: coherence
    weight: 0.6
    status: active
    added: "2026-06-18"
    last_validated: "2026-06-18"
    source: "Every real browser sends a recognised h2 pseudo-header order (Chrome m,a,s,p; Firefox m,p,a,s; Safari m,s,p,a); a Go/Python http2 client — or a browser fronted by a non-browser h2 proxy — under a browser UA does not. The h2 analog of tls_no_grease, and a second network-layer tell beyond no_js_execution. Closes the gap where net.h2_vs_ua_browser stays silent on an *unrecognised* (not merely mismatched) h2 engine."

  - id: net.h2_header_order_vs_ua
    title: Chromium UA but the HTTP/2 regular-header order is not chromium-shaped (JA4H)
    layers: [network]
    reads: [network.h2_header_order_non_chromium]
    predicate: present
    weight: 0.6
    status: experimental
    category: coherence
    added: "2026-06-18"
    last_validated: "2026-06-18"
    source: "JA4H regular-header order: Chromium emits the Sec-CH-UA client-hint group before user-agent on a secure origin; a Chrome/Edge UA whose header order does not is a non-browser h2 stack wearing a Chrome UA. Conservative + asymmetric (only the Chromium signature is positively classified; Firefox/Safari/non-browser stay 'unknown' and gate off) — experimental pending live-fleet validation of real-browser header orders. Extends pseudo-header coverage (net.h2_unknown_vs_ua) to the regular-header order. Ref FoxIO JA4H."

