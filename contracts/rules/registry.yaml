    source: "CreepJS: a real engine is deterministic; per-render noise is farbling/anti-detect injection. v0.73.3: per-browser N/A — a privacy browser farbles/blocks audio by design (Brave Shields via browser.is_brave; Tor/Mullvad/RFP-Firefox via browser.rfp_browser), so the detector drops this artifact (detector.applicability) rather than convict a real privacy-browser user; a Chrome-claiming farbler with no such identity still convicts, and a privacy-browser-faking bot is caught by its automation tells."

  - id: br.readback_noise
    title: AudioBuffer getChannelData and copyFromChannel disagree — readback noise shim
    layers: [browser]
    reads: [browser.audio_readback_noise]
    predicate: present
    weight: 0.4
    status: experimental
    category: artifact
    added: "2026-06-18"
    last_validated: "2026-06-19"
    source: "getChannelData and copyFromChannel read the same AudioBuffer, so a real engine returns bit-identical bytes (verified diff=0 on Chrome 136); a farbling shim perturbing one path diverges. Deeper than audio_noise (render determinism). v0.73.7: this also fires on a real privacy browser's by-design audio farbling (Brave), which is the SAME footprint as canvas_noise/audio_noise — so it joins the detector.applicability privacy-browser N/A: dropped for a session positively identified as Brave/Tor/Mullvad/RFP-Firefox (browser.is_brave / rfp_browser+gecko) so a real privacy-browser user is not flagged. Only an INCONSISTENT shim (one readback path farbled, the other not) trips it. v0.73.9 LIVE POSITIVE validation: the AUDIO_READBACK_SPOOF stealth evader (a copyFromChannel-only audio farble) was run through the detector+edge stack and tripped br.readback_noise — the rule was previously unexercised (no fleet evader perturbed the audio readback inconsistently); it now has a live positive. (Canvas putImageData round-trips are NOT used: premultiplied alpha makes them lossy on every real browser.) v0.74.21 LIVE re-validation (2026-06-19): a fresh Camoufox capture through the live stack does NOT trip this — Camoufox sets no privacy-browser identity (applicability does not drop it), so the absence is real signal: its audio readback is internally CONSISTENT across getChannelData/copyFromChannel (a quality engine-level tool, not a naive one-path shim). CORRECTION of an earlier note that claimed Camoufox trips it — it does not. So the ONLY live positive remains the deliberately-inconsistent AUDIO_READBACK_SPOOF shim; no INDEPENDENT anti-detect tool in the fleet perturbs the readback inconsistently. STAYS experimental pending an independent second positive — promoting on a single self-constructed positive would be single-source over-leverage. Real-browser negative is CI-guarded (test_calibration_methodology asserts artifact-category clean on real headful Chromium/Firefox/WebKit)."

  - id: br.domrect_invariant
    title: getBoundingClientRect is non-deterministic or disagrees with getClientRects — geometry shim
    layers: [browser]
    reads: [browser.domrect_invariant_violated]
    predicate: present
    weight: 0.55
    status: active
    category: artifact
    added: "2026-06-19"
    last_validated: "2026-06-19"
    source: "On a real engine getBoundingClientRect is deterministic (two reads of an unchanged element are identical — pages depend on it) and a single-rect element's getClientRects()[0] equals it (verified on Chrome 136). A per-call DOMRect-noise shim breaks determinism; a tool hooking one geometry path but not the other breaks consistency. FP-safe: determinism is a hard invariant no real browser (incl. farblers, which use stable per-session offsets) violates. Ref CreepJS domrect."

  - id: br.measuretext_offscreen_vs
    title: Canvas measureText differs between main and OffscreenCanvas — main-thread font hook
    layers: [browser]
    reads: [browser.measuretext_offscreen_divergence]
    predicate: present
    weight: 0.6
    status: active
    category: artifact
    added: "2026-06-19"
    last_validated: "2026-06-19"
    source: "Main CanvasRenderingContext2D.measureText and OffscreenCanvas measureText use the same engine font metrics, so they are identical on a real browser (verified width 390.34375 == on Chrome 136). A tool that hooks the main-thread CanvasRenderingContext2D.measureText to spoof fonts but not OffscreenCanvasRenderingContext2D (a DISTINCT prototype) diverges — the incomplete-spoof tell from the catalog's measureText gap. FP-safe (a real browser never diverges); gated on OffscreenCanvas support. v0.74.22 FIRST LIVE POSITIVE: the new stealth MEASURETEXT_SPOOF=1 evader (hooks main-thread measureText, +0.5px width farble, leaves OffscreenCanvas real) was run through the live edge+detector and tripped br.measuretext_offscreen_vs; the rule was active but previously unexercised (no fleet evader hooked one realm's measureText), a constraint-#6 liability now resolved. NEGATIVE controls: a plain STEALTH=1 run does NOT trip it, AND real Camoufox does NOT — its font protection is ENGINE-LEVEL (consistent across realms, like its audio readback), so all three committed camoufox captures lack the signal. CORRECTION of the earlier 'e.g. Camoufox' example: Camoufox is the FP-safe negative here, NOT a positive — the positive is a realm-incomplete JS hook."

  - id: br.fingerprint_improbable
    title: Fingerprint joint (platform/gpu/screen/colour/cores) is improbable under the real-traffic prior
    layers: [browser]
    reads: [browser.prevalence_low]
    predicate: present
    weight: 0.25
    status: experimental
    category: prevalence
    added: "2026-06-19"
    last_validated: "2026-06-19"
    source: "The prevalence/likelihood model (docs/prevalence-model.md): coherence rules catch hard contradictions, this catches soft IMPROBABILITY — a coherent fingerprint whose platform/gpu/screen/colour/cores combination is deep in the tail of the real-traffic prior (the BrowserForge/randomizer attack no contradiction rule fires on). Emitted by detector.prevalence below the prior's p1 threshold (~1% of real fingerprints). CORROBORATING-only (experimental, low weight): the prior is single-source (browserforge) until corroborated against Tier-3 real traffic, so it amplifies an existing suspicion, never convicts alone. v0.73.1: the SCREEN factor was cross-checked against the Intoli real-traffic source and FAILED as exact 'WxH' — the browserforge prior missed 13-46% of real desktop resolutions (a circular single-source FP: validated only on browserforge, it would convict real users on an unseen screen). Fixed by coarsening screen to (size-class, orientation) buckets, cutting the real-traffic miss to ~0% (macOS/Android/Linux); gpu/colour/cores stay single-source pending Tier-3. v0.74.8: 'unknown never fires' — the committed threshold is the p1 of FULL-vector browserforge fingerprints, so scoring a PARTIAL vector let a missing factor's eps floor (~-9.2 nats each) masquerade as improbability (a session lacking screen+colour sank ~-18 below threshold and tripped on ABSENCE, not improbability — an absence-as-improbability FP). Now is_improbable abstains unless gpu/screen/colour/cores are ALL observed; on the live corpus this dropped 14 fires → 3 (the genuine full-vector improbable joints: iframe-spoof/stealth-patched/ios-ua-spoof) with ZERO net detection loss (the 11 dropped were partial-vector captures already hard-convicted by coherence/automation). v0.74.20: the COLOUR factor was DROPPED — a second circular single-source FP, like the screen factor. color_depth is a DISPLAY property (24=sRGB, 30=HDR), OS-INDEPENDENT — every real browser reports 24 regardless of platform (GROUNDED: the headful Chromium/Firefox/WebKit captures all report 24, and color_depth does not vary by OS). But browserforge GENERATES color_depth=32 for Windows at 93%, so a real Windows user (24) took a ~-3 log penalty that the browserforge calibration could NEVER see (browserforge scores its own 32s against a 32-heavy prior, no penalty; the bias only manifests on real 24-reporting traffic). Conditioning a display property on the OS is unsound and the colour prior is uncorroborable (Intoli lacks color_depth), so per the standing 'never act on a single-source number' rule the factor was removed rather than trusted. The prior + p1 threshold were regenerated over gpu/screen/cores (threshold -10.75 -> -9.04); a real-Windows-like fingerprint's margin improved (-6.55 -> -3.48) and the corpus label distribution is unchanged (51 bot / 1 suspicious, zero detection loss; corroborating-only). v0.74.21: the CORES factor was COARSENED into size-class buckets (<=2 / 3-4 / 5-8 / 9-16 / 17+), the same fix the screen factor got. The EXACT hardware_concurrency was a single-source FP landmine: browserforge under-samples real cores diversity and its prior has gaps + garbage (a 384-cores value), so a real but uncommon-or-high count took a deep penalty the browserforge calibration could not see — a real 128-core workstation hit the eps floor (-9.2) and was flagged improbable on CORES ALONE, and a common 6-core CPU took ~-3.7. Bucketing maps every plausible real count to a populated bin (no eps-gap): a real Windows + 128-core workstation now scores -4.91, a 6/8-core -3.32. Prior + p1 threshold regenerated over gpu/screen/cores-bucket (-9.04 -> -7.73); corpus label distribution unchanged (51 bot / 1 suspicious, zero detection loss). gpu remains single-source pending Tier-3; screen and cores are now both coarsened-robust and colour is dropped."


